<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Calculator</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    font-family:Arial;
}

.calculator{
    width:340px;
    padding:20px;
    border-radius:25px;
    background: rgba(20,20,20,0.8);
    box-shadow: 0 0 30px rgba(0,255,255,0.08);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
}

.display{
    height:80px;
    background:#000;
    color:#00ffe1;
    font-size:32px;
    text-align:right;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow: inset 0 0 10px rgba(0,255,225,0.2);
    overflow:hidden;
}

.buttons{
    display:flex;
    gap:10px;
}

.numbers{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    flex:3;
}

.operators{
    display:grid;
    grid-template-rows:repeat(5,1fr);
    gap:10px;
    flex:1;
}

button{
    border:none;
    height:60px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    background:#1c1c1c;
    color:white;
    transition:0.25s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 15px rgba(0,255,225,0.3);
}

.num{
    background:#222;
}

.op{
    background:#111;
    color:#00ffe1;
}

.equal{
    background:linear-gradient(45deg,#00ffe1,#00b3ff);
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="display" id="display">0</div>

    <div class="buttons">

        <!-- nums -->
        <div class="numbers">
            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>

            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>

            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>

            <button class="num" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>
            <button class="num" onclick="clearDisplay()">C</button>
        </div>

        <!-- operations -->
        <div class="operators">
            <button class="op" onclick="append('/')">÷</button>
            <button class="op" onclick="append('*')">×</button>
            <button class="op" onclick="append('-')">−</button>
            <button class="op" onclick="append('+')">+</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>

    </div>
</div>

<script>
let display = document.getElementById("display");

function append(val){
    if(display.innerText === "0"){
        display.innerText = val;
    } else {
        display.innerText += val;
    }
}

function clearDisplay(){
    display.innerText = "0";
}

function calculate(){
    try{
        display.innerText = eval(display.innerText);
    } catch{
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
